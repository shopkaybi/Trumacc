<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRUMACC SHOP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd1dc,#ffffff);
  overflow-x:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff69b4,#ffffff);
}

.fire{
  background: linear-gradient(90deg,#ff0000,#ff7a00,#ffd000,#ff0000);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: fire 2s linear infinite;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.intro-box{
  width:85%;
  max-width:340px;
  background:linear-gradient(135deg,#ff69b4,#fff);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.intro-box button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  font-weight:bold;
}

/* NOTICE */
.notice{
  background:#111;
  color:#ff69b4;
  text-align:center;
  padding:8px;
  font-weight:bold;
}

/* SEARCH */
.searchBox{
  text-align:center;
  margin:10px;
}

.searchBox input{
  width:90%;
  max-width:400px;
  padding:10px;
  border:2px solid #ff69b4;
  border-radius:10px;
}

/* SHOP */
.container{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:10px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,105,180,0.3);
  position:relative;
  z-index:1;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.tag{
  position:absolute;
  top:8px;
  left:8px;
  background:#ff69b4;
  color:#fff;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
}

/* INFO */
.info{
  padding:10px;
}

.price{
  color:#ff4da6;
  font-weight:bold;
}

.note{
  font-size:12px;
  color:#666;
}

/* BUTTON */
.btn{
  display:flex;
  gap:6px;
  padding:10px;
}

.btn button{
  flex:1;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.detailBtn{background:#111;color:#fff;}
.buyBtn{background:#ff69b4;color:#fff;}

/* POPUP DETAIL */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  width:320px;
  background:#fff;
  border-radius:10px;
  padding:15px;
  text-align:center;
}

.box img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* BUY */
.buyPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.buyBox{
  width:300px;
  background:#fff;
  border-radius:12px;
  padding:15px;
}

.buyBox button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.fb{background:#1877f2;color:#fff;}
.zl{background:#00c300;color:#fff;}

/* SNOW */
.snow{
  position:fixed;
  top:-10px;
  color:white;
  font-size:14px;
  animation: fall linear forwards;
  pointer-events:none;
}

@keyframes fall{
  to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-box">
    <h2>🔥 TRUMACC SHOP 🔥</h2>
    <p>💗 Uy tín 100%</p>
    <p>🛡 Admin có cọc</p>
    <button onclick="closeIntro()">VÀO SHOP</button>
  </div>
</div>

<header>
  <div class="fire">🔥 TRUMACC SHOP 🔥</div>
</header>

<div class="notice">
🔥 SHOP UY TÍN - KHÔNG SCAM - GIAO DỊCH NHANH 🔥
</div>

<div class="searchBox">
  <input id="search" onkeyup="render()" placeholder="Tìm acc...">
</div>

<div class="container" id="list"></div>

<!-- DETAIL -->
<div class="popup" id="popup" onclick="this.style.display='none'">
  <div class="box" onclick="event.stopPropagation()">
    <img id="img">
    <h3 id="title"></h3>
    <p id="price"></p>
    <p id="code"></p>
    <p id="note"></p>
  </div>
</div>

<!-- BUY -->
<div class="buyPopup" id="buyPopup" onclick="this.style.display='none'">
  <div class="buyBox" onclick="event.stopPropagation()">
    <h3>LIÊN HỆ MUA</h3>

    <button class="fb" onclick="window.open('https://www.facebook.com/share/17sCFrf2ZF/')">
      Facebook
    </button>

    <button class="zl" onclick="window.open('https://zaloapp.com/qr/p/qvoo9gxy0f8o?src=qr')">
      Zalo
    </button>

  </div>
</div>

<script>

function closeIntro(){
  document.getElementById("intro").style.display="none";
}

/* DATA 1 ACC */
const data=[
  {
    code:"ADMIN01",
    title:"ACC BLOX FRUIT VIP",
    price:"200.000đ",
    note:"Full max level - uy tín 100%",
    img:"https://sf-static.upanhlaylink.com/img/image_202606132be31ee49ca1c70199a94b9d93128d70.jpg"
  }
];

/* RENDER */
function render(){
  let v=document.getElementById("search").value.toLowerCase();
  let list=document.getElementById("list");
  list.innerHTML="";

  data.filter(x =>
    x.title.toLowerCase().includes(v) ||
    x.code.toLowerCase().includes(v)
  ).forEach(x=>{
    list.innerHTML+=`
      <div class="card">
        <div class="tag">${x.code}</div>
        <img src="${x.img}">
        <div class="info">
          <b>${x.title}</b><br>
          <div class="price">${x.price}</div>
          <div class="note">${x.note}</div>
        </div>

        <div class="btn">
          <button class="detailBtn" onclick="openDetail('${x.title}','${x.price}','${x.code}','${x.note}','${x.img}')">
            Chi tiết
          </button>

          <button class="buyBtn" onclick="openBuy()">
            Mua
          </button>
        </div>
      </div>
    `;
  });
}

/* DETAIL */
function openDetail(t,p,c,n,i){
  document.getElementById("popup").style.display="flex";
  document.getElementById("img").src=i;
  document.getElementById("title").innerText=t;
  document.getElementById("price").innerText=p;
  document.getElementById("code").innerText=c;
  document.getElementById("note").innerText=n;
}

/* BUY */
function openBuy(){
  document.getElementById("buyPopup").style.display="flex";
}

/* SNOW */
function snow(){
  let s=document.createElement("div");
  s.className="snow";
  s.innerHTML="❄";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),10000);
}
setInterval(snow,200);

/* INIT */
render();

</script>

</body>
</html>
